# Default stack for OSS/local dev: Neo4j Community Edition.
# For Neo4j Enterprise + APOC, use: docker compose -f docker-compose.yml -f docker-compose.enterprise.yml up -d

services:
  neo4j:
    image: ${NEO4J_IMAGE:-neo4j:5-community}
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ecp_local_dev
    volumes:
      - neo4j_data:/data

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ecp
      POSTGRES_USER: ecp
      POSTGRES_PASSWORD: ecp_local_dev
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  neo4j_data:
  pg_data:
  redis_data:
