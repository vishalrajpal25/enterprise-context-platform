# Render.com Blueprint — Neon (Postgres+pgvector) + Aura (Neo4j) + Render (web).
#
# Topology:
#   - Render web service (this file)                — ECP FastAPI on :8080
#   - Neon free Postgres + pgvector (external)      — https://neon.tech
#   - Neo4j AuraDB Free (external)                  — https://neo4j.com/cloud/aura
#   - In-process caches only                        — no Redis for single-instance demo
#   - UptimeRobot free 5-min HTTP check → /admin/keep-warm (keeps Render + Neon + Aura warm)
#
# Apply flow:
#   1. Render → New → Blueprint → select this repo → applies this file
#   2. Render prompts for every env var marked `sync: false` — paste secrets there
#   3. First deploy runs `preDeployCommand` (init_db.py, idempotent) then boots the web service
#   4. Run scripts/seed_remote.sh locally once against Neon+Aura to load demo data
#   5. Verify /health, then optionally add UptimeRobot ping on /admin/keep-warm
#
# Secrets never live in this file — only non-sensitive defaults do.

services:
  - type: web
    name: ecp-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    # Idempotent — CREATE TABLE IF NOT EXISTS + vector-dim migration.
    # Safe to re-run on every deploy.
    preDeployCommand: python scripts/init_db.py
    envVars:
      # ----- Resolution behavior -----
      - key: ECP_RESOLUTION_MODE
        value: orchestrator           # rule-based; flip to `intelligent` after adding ECP_ANTHROPIC_API_KEY
      - key: ECP_DEMO_MODE
        value: "true"                 # opens CORS for the public demo UI

      # ----- Authorization (DEMO ONLY) -----
      # No OPA sidecar deployed, so authorization fails open.
      # Production MUST run OPA and set ECP_OPA_DEFAULT_ALLOW=false.
      - key: ECP_OPA_DEFAULT_ALLOW
        value: "true"

      # ----- Search posture -----
      # Identity-required by default; demo UI sends a demo user header so visitor search still works.
      - key: ECP_SEARCH_REQUIRE_IDENTITY
        value: "true"

      # ----- Embeddings (Voyage, free tier) -----
      - key: ECP_EMBEDDING_PROVIDER
        value: voyage
      - key: ECP_EMBEDDING_DIM
        value: "512"                  # voyage-3-lite; change to 1536 if switching to OpenAI

      # ----- Legacy in-container bootstrap (OFF now that we use preDeployCommand) -----
      - key: ECP_BOOTSTRAP_DB
        value: "false"
      - key: ECP_AUTO_SEED_DEMO
        value: "false"

      # ============================================================
      # SECRETS — Render prompts for these at blueprint apply time.
      # `sync: false` means "never sync from another env group;
      #                     always require manual entry per environment."
      # ============================================================

      # Neon: pooled connection string, MUST include ?sslmode=require
      - key: ECP_POSTGRES_DSN
        sync: false

      # Aura: the neo4j+s://<id>.databases.neo4j.io URI
      - key: ECP_NEO4J_URI
        sync: false
      - key: ECP_NEO4J_USER
        sync: false                   # usually "neo4j" or the instance id
      - key: ECP_NEO4J_PASSWORD
        sync: false

      # API auth — required. Every request must send x-ecp-api-key: <this>.
      # Generate with: openssl rand -hex 32
      - key: ECP_API_KEY
        sync: false

      # Embeddings — real cosine retrieval needs this; otherwise ECP falls back to ILIKE.
      - key: ECP_VOYAGE_API_KEY
        sync: false

      # OPTIONAL — only if you flip ECP_RESOLUTION_MODE to intelligent.
      - key: ECP_ANTHROPIC_API_KEY
        sync: false
